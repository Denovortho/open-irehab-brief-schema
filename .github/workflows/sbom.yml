# Tracks shared reusable workflow at cutemo0953/.github @v1.
# Spec: ~/Downloads/SPEC_SBOM.md Rev 0.5.
#
# Trigger = release event (brief-schema uses v0.1.x tag releases for
# spec revisions). Each release attaches CycloneDX + SPDX SBOMs as
# assets. workflow_dispatch enables initial verification before any
# release exists.
#
# permissions: contents: write — required by reusable's release-attach
# step (gh release upload). Reusable intentionally has no top-level
# permissions block; caller widens.

name: SBOM

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  sbom:
    uses: cutemo0953/.github/.github/workflows/sbom.yml@v1
    with:
      language: docs
      artifact-prefix: open-brief-schema-sbom
      fail-on-severity: none
    permissions:
      contents: write
